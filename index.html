<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAML Slide Builder</title>
  <meta name="description" content="YAML-driven presentation builder — design slides in structured text, export to PPTX, HTML, or Marp. Flow auditor included.">
  <meta property="og:title" content="Presentation Sage">
  <meta property="og:description" content="YAML-driven presentation builder — design slides in structured text, export to PPTX, HTML, or Marp.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://slides.neorgon.com/">
  <meta property="og:site_name" content="Neorgon">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Presentation Sage">
  <meta name="twitter:description" content="YAML-driven presentation builder — design slides in structured text, export to PPTX, HTML, or Marp.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://slides.neorgon.com/">
  <meta name="theme-color" content="#040714">
  <style>
    /* ── Reset & tokens ──────────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:              #040714;
      --surface-1:       rgba(255,255,255,.03);
      --surface-2:       rgba(255,255,255,.06);
      --border-subtle:   rgba(255,255,255,.07);
      --border:          rgba(255,255,255,.10);
      --border-strong:   rgba(255,255,255,.22);
      --text-primary:    #f9f9f9;
      --text-secondary:  #cacaca;
      --text-muted:      rgba(255,255,255,.45);
      --text-dim:        rgba(255,255,255,.25);
      --accent:          #0063e5;
      --accent-bright:   #0080ff;
      --warn:            #fbbf24;
      --danger:          #f87171;
      --success:         #34d399;
      --font:            'Avenir Next', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono:            'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      --radius-sm:       6px;
      --radius:          10px;
      --radius-lg:       15px;
      --dur:             200ms;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .header-bar {
      background: linear-gradient(135deg, #B015B0 0%, #3D0080 45%, #080010 100%);
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding: 0 24px;
      height: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo { display: flex; flex-direction: column; }
    .header-logo h1 {
      font-size: 1rem; font-weight: 700; color: #f9f9f9;
      letter-spacing: -0.3px; line-height: 1.2;
    }
    .header-logo h1 span { font-weight: 400; opacity: .7; }
    .header-tagline { font-size: .72rem; color: rgba(255,255,255,.55); margin-top: 1px; }

    .header-home {
      margin-left: auto;
      color: rgba(255,255,255,.6); text-decoration: none;
      font-size: .78rem; padding: 5px 10px;
      border-radius: var(--radius-sm); transition: all var(--dur);
    }
    .header-home:hover { color: #fff; background: rgba(255,255,255,.1); }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    .toolbar {
      height: 44px; flex-shrink: 0;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--surface-1);
      display: flex; align-items: center;
      padding: 0 16px; gap: 6px;
    }
    .toolbar-label { font-size: .72rem; color: var(--text-muted); margin-right: 2px; }
    .sep { width: 1px; height: 18px; background: var(--border-subtle); margin: 0 4px; flex-shrink: 0; }
    .theme-select {
      height: 26px; padding: 0 8px;
      background: var(--surface-1); border: 1px solid var(--border);
      color: var(--text-secondary); border-radius: var(--radius-sm);
      font-family: var(--font); font-size: .75rem; cursor: pointer;
    }
    .theme-select:focus { outline: 1px solid var(--accent); }

    .btn {
      padding: 5px 13px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-secondary);
      font-family: var(--font); font-size: .8rem;
      cursor: pointer; transition: all var(--dur);
      white-space: nowrap;
    }
    .btn:hover { background: var(--surface-2); border-color: var(--border-strong); color: var(--text-primary); }
    .btn-primary {
      background: var(--accent); border-color: var(--accent);
      color: #fff; font-weight: 600;
    }
    .btn-primary:hover { background: var(--accent-bright); border-color: var(--accent-bright); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: .75rem; }
    .btn-ghost {
      background: none; border-color: transparent; color: var(--text-muted);
    }
    .btn-ghost:hover { background: var(--surface-2); border-color: var(--border); color: var(--text-primary); }

    /* ── Workspace ───────────────────────────────────────────────────────── */
    .workspace {
      flex: 1; display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    /* ── Editor pane ─────────────────────────────────────────────────────── */
    .editor-pane {
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border-subtle);
      overflow: hidden;
    }
    .pane-header {
      height: 34px; flex-shrink: 0;
      padding: 0 14px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; gap: 8px;
      font-size: .7rem; text-transform: uppercase;
      letter-spacing: .8px; color: var(--text-muted);
    }
    .pane-header .dot {
      width: 6px; height: 6px;
      border-radius: 50%; flex-shrink: 0;
    }
    .dot-blue  { background: var(--accent); }
    .dot-green { background: var(--success); }

    #yaml-input {
      flex: 1; resize: none;
      background: transparent; border: none; outline: none;
      color: var(--text-primary);
      font-family: var(--mono); font-size: .8rem;
      line-height: 1.65; padding: 14px 16px;
      overflow-y: auto;
    }
    #yaml-input::placeholder { color: var(--text-dim); }

    /* ── Warnings bar ────────────────────────────────────────────────────── */
    .warnings-bar {
      flex-shrink: 0; max-height: 130px; overflow-y: auto;
      border-top: 1px solid var(--border-subtle);
      background: rgba(0,0,0,.15);
    }
    .warnings-bar.empty {
      padding: 8px 14px;
      font-size: .75rem; color: var(--success);
    }
    .warning-item {
      padding: 5px 14px;
      display: flex; align-items: baseline; gap: 8px;
      font-size: .75rem; line-height: 1.4;
      border-bottom: 1px solid rgba(255,255,255,.03);
    }
    .warning-item:last-child { border-bottom: none; }
    .warning-item.lvl-error { color: var(--danger); }
    .warning-item.lvl-warn  { color: var(--warn); }
    .warning-item.lvl-info  { color: var(--text-muted); }
    .warning-badge {
      font-size: .65rem; font-weight: 700; padding: 1px 5px;
      border-radius: 3px; flex-shrink: 0; white-space: nowrap;
    }
    .lvl-error .warning-badge { background: rgba(248,113,113,.15); color: var(--danger); }
    .lvl-warn  .warning-badge { background: rgba(251,191,36,.12);  color: var(--warn); }
    .lvl-info  .warning-badge { background: var(--surface-2);      color: var(--text-muted); }

    /* ── Preview pane ────────────────────────────────────────────────────── */
    .preview-pane {
      display: flex; flex-direction: column;
      overflow: hidden; background: #000;
    }
    .preview-header {
      height: 34px; flex-shrink: 0;
      padding: 0 14px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(255,255,255,.01);
      display: flex; align-items: center; gap: 8px;
      font-size: .7rem; text-transform: uppercase;
      letter-spacing: .8px; color: var(--text-muted);
    }
    .slide-nav {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
    }
    .nav-btn {
      width: 22px; height: 22px;
      background: none; border: 1px solid var(--border);
      color: var(--text-secondary); border-radius: 4px;
      cursor: pointer; font-size: .75rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--dur);
    }
    .nav-btn:hover:not(:disabled) { background: var(--surface-2); border-color: var(--border-strong); }
    .nav-btn:disabled { opacity: .3; cursor: default; }
    #slide-counter { font-size: .75rem; color: var(--text-muted); min-width: 48px; text-align: center; }

    .slide-stage {
      flex: 1; position: relative; overflow: hidden;
    }

    /* ── Slide canvas — fixed 960×540, JS scales it to fit the container ── */
    .slide {
      position: absolute;
      width: 960px; height: 540px;
      transform-origin: top left;
      background: #080f20;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.08);
      display: flex; flex-direction: column;
      overflow: hidden;
      padding: 48px 60px;
    }
    .slide::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,99,229,.05) 0%, transparent 55%);
      pointer-events: none;
    }
    .slide-num {
      position: absolute; bottom: 14px; right: 18px;
      font-size: 11px; color: rgba(255,255,255,.18);
      font-family: var(--mono);
    }
    .slide-logo-watermark {
      position: absolute; top: 16px; right: 18px;
      max-height: 30px; max-width: 80px;
      object-fit: contain; opacity: .6; z-index: 2;
    }
    .title-logo {
      max-height: 52px; max-width: 140px;
      object-fit: contain; margin-bottom: 20px;
    }

    /* Title slide */
    .slide-type-title {
      align-items: center; justify-content: center; text-align: center;
    }
    .slide-type-title .s-heading {
      font-size: 40px;
      font-weight: 700; color: #fff; line-height: 1.2;
    }
    .accent-bar {
      width: 48px; height: 4px; border-radius: 2px;
      background: var(--sl-accent, #0063e5); margin: 18px auto;
    }
    .slide-type-title .s-subtitle {
      font-size: 18px;
      color: rgba(255,255,255,.5); font-weight: 400;
    }
    .slide-type-title .s-meta {
      position: absolute; bottom: 22px; left: 60px; right: 60px;
      display: flex; justify-content: space-between;
      font-size: 12px; color: rgba(255,255,255,.25);
    }

    /* Bullets slide */
    .slide-type-bullets { justify-content: flex-start; }
    .s-heading {
      font-size: 26px;
      font-weight: 700; color: var(--sl-text, #fff); margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--sl-border, rgba(255,255,255,.07));
      flex-shrink: 0;
    }
    .s-bullets { list-style: none; overflow: hidden; }
    .s-bullets li {
      padding: 7px 0 7px 22px; position: relative;
      font-size: 18px;
      color: var(--sl-ts, #cacaca); line-height: 1.4;
    }
    .s-bullets li::before {
      content: '';
      position: absolute; left: 0; top: 14px;
      width: 7px; height: 7px;
      border-radius: 50%; background: var(--sl-accent, #0063e5);
    }

    /* Split slide */
    .slide-type-split { justify-content: flex-start; }
    .split-cols {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 24px; flex: 1; overflow: hidden;
    }
    .split-col-head {
      font-size: 13px;
      font-weight: 700; color: var(--sl-accent, #0063e5);
      text-transform: uppercase; letter-spacing: .6px;
      margin-bottom: 10px;
    }

    /* Code slide */
    .slide-type-code { justify-content: flex-start; }
    .code-block {
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 8px; padding: 18px;
      flex: 1; overflow: hidden;
    }
    .code-lang {
      font-size: 11px; color: var(--sl-dim, rgba(255,255,255,.3));
      font-family: var(--mono); text-transform: uppercase;
      letter-spacing: .8px; margin-bottom: 10px;
    }
    .code-block pre {
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.55; color: var(--sl-code-text, #a5f3fc);
      white-space: pre-wrap; word-break: break-word;
    }

    /* Quote slide */
    .slide-type-quote {
      align-items: center; justify-content: center; text-align: center;
    }
    .quote-mark {
      font-size: 72px; line-height: .8;
      color: var(--sl-accent, #0063e5); opacity: .35;
      font-family: Georgia, serif;
    }
    .quote-text {
      font-size: 22px;
      color: var(--sl-text, #fff); font-style: italic; line-height: 1.6; margin-top: 10px;
    }
    .quote-source {
      margin-top: 18px;
      font-size: 14px;
      color: var(--sl-accent, #0063e5); font-weight: 600;
    }

    /* Divider slide */
    .slide-type-divider {
      align-items: center; justify-content: center; text-align: center;
      background: linear-gradient(135deg, rgba(176,21,176,.12) 0%, rgba(61,0,128,.12) 50%, transparent 100%);
    }
    .slide-type-divider .s-heading {
      font-size: 44px;
      border-bottom: none; margin-bottom: 0; padding-bottom: 0;
    }
    .slide-type-divider .s-subtitle {
      font-size: 17px;
      color: rgba(255,255,255,.45); margin-top: 14px;
    }

    /* Q&A slide */
    .slide-type-qa {
      align-items: center; justify-content: center; text-align: center;
    }
    .qa-icon { font-size: 48px; margin-bottom: 18px; }
    .slide-type-qa .s-heading {
      font-size: 36px;
      border-bottom: none; margin-bottom: 0; padding-bottom: 0;
    }
    .slide-type-qa .s-subtext {
      font-size: 16px;
      color: rgba(255,255,255,.4); margin-top: 12px;
    }

    /* CTA slide */
    .slide-type-cta {
      align-items: center; justify-content: center; text-align: center;
    }
    .slide-type-cta .s-heading {
      font-size: 30px;
      border-bottom: none; margin-bottom: 24px; padding-bottom: 0;
    }
    .cta-pill {
      background: var(--sl-accent, #0063e5); color: #fff;
      font-weight: 700; font-size: 18px;
      padding: 13px 32px; border-radius: 9px;
      display: inline-block;
    }
    .s-subtext {
      margin-top: 16px;
      font-size: 14px;
      color: rgba(255,255,255,.38);
    }

    /* Error / empty state */
    .slide-state {
      align-items: center; justify-content: center; text-align: center;
    }
    .slide-state .s-icon { font-size: 36px; margin-bottom: 14px; opacity: .4; }
    .slide-state p {
      font-size: 16px; color: var(--text-muted); line-height: 1.6;
    }
    .slide-state.error p { color: var(--danger); font-family: var(--mono); font-size: 14px; }

    /* Empty stage placeholder (not a slide) */
    .stage-empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: var(--text-dim);
    }
    .stage-empty .s-icon { font-size: 2rem; opacity: .4; }
    .stage-empty p { font-size: .82rem; line-height: 1.6; text-align: center; }

    /* Fullscreen overlay */
    .fullscreen-stage {
      position: fixed; inset: 0; z-index: 500;
      background: #000;
      display: none;
    }
    .fullscreen-stage.active { display: block; }
    .fullscreen-controls {
      position: fixed; bottom: 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .fullscreen-controls .nav-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.06);
      font-size: 1rem;
    }
    #fs-counter { font-size: .82rem; color: rgba(255,255,255,.4); min-width: 60px; text-align: center; }
    .fs-exit {
      position: fixed; top: 16px; right: 16px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.6); border-radius: 6px;
      padding: 6px 12px; cursor: pointer; font-size: .8rem;
      transition: all var(--dur);
    }
    .fs-exit:hover { background: rgba(255,255,255,.12); color: #fff; }

    /* ── Filmstrip ───────────────────────────────────────────────────────── */
    .filmstrip {
      height: 76px; flex-shrink: 0;
      border-top: 1px solid var(--border-subtle);
      background: rgba(0,0,0,.25);
      display: flex; align-items: center;
      gap: 7px; padding: 7px 10px;
      overflow-x: auto; overflow-y: hidden;
    }
    .filmstrip::-webkit-scrollbar { height: 4px; }
    .filmstrip::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
    .film-thumb {
      flex-shrink: 0; width: 106px; height: 60px;
      border-radius: 5px; border: 1.5px solid var(--border);
      cursor: pointer; position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 4px 6px;
      background: #080f20;
      transition: border-color var(--dur), transform var(--dur);
    }
    .film-thumb:hover { border-color: rgba(255,255,255,.3); transform: translateY(-2px); }
    .film-thumb.active { border-color: var(--accent); }
    .film-type {
      position: absolute; top: 4px; left: 5px;
      font-size: .52rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .3px; color: rgba(255,255,255,.3);
      background: rgba(0,0,0,.4); padding: 1px 4px; border-radius: 2px;
    }
    .film-num {
      position: absolute; top: 4px; right: 5px;
      font-size: .52rem; color: rgba(255,255,255,.22); font-family: var(--mono);
    }
    .film-text {
      font-size: .58rem; color: rgba(255,255,255,.5);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
    }

    /* ── Audit panel (below preview) ─────────────────────────────────────── */
    .audit-panel {
      flex-shrink: 0; max-height: 0; overflow: hidden;
      border-top: 1px solid var(--border-subtle);
      background: rgba(0,0,0,.2);
      transition: max-height .28s ease;
    }
    .audit-panel.open { max-height: 260px; overflow-y: auto; }
    .audit-inner { padding: 14px 16px; }
    .audit-title {
      font-size: .72rem; font-weight: 700; color: var(--text-primary);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px;
    }
    .audit-section { margin-bottom: 14px; }
    .audit-section-head {
      font-size: .65rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
    }
    .audit-item {
      display: flex; align-items: baseline; gap: 8px;
      font-size: .72rem; line-height: 1.45; padding: 3px 0;
    }
    .audit-item.lvl-error { color: var(--danger); }
    .audit-item.lvl-warn  { color: var(--warn); }
    .audit-item.lvl-info  { color: var(--text-muted); }
    .audit-badge {
      font-size: .6rem; font-weight: 700; padding: 1px 5px;
      border-radius: 3px; flex-shrink: 0;
    }
    .lvl-error .audit-badge { background: rgba(248,113,113,.15); color: var(--danger); }
    .lvl-warn  .audit-badge { background: rgba(251,191,36,.12);  color: var(--warn); }
    .lvl-info  .audit-badge { background: var(--surface-2);      color: var(--text-muted); }
    .audit-question {
      font-size: .7rem; line-height: 1.5; color: var(--text-muted);
      padding: 3px 0 3px 14px; position: relative;
    }
    .audit-question::before { content: '→'; position: absolute; left: 0; color: var(--accent); opacity: .6; }
    .audit-ok { font-size: .72rem; color: var(--success); }

    /* ── Grid overview ───────────────────────────────────────────────────── */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(2,4,14,.96);
      display: none; flex-direction: column;
    }
    .grid-overlay.active { display: flex; }
    .grid-overlay-bar {
      height: 46px; flex-shrink: 0;
      background: rgba(255,255,255,.02); border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; padding: 0 20px; gap: 10px;
    }
    .grid-overlay-bar h2 { font-size: .85rem; font-weight: 600; }
    .grid-overlay-bar span { font-size: .72rem; color: var(--text-muted); }
    .grid-close {
      margin-left: auto;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.6); border-radius: 6px;
      padding: 5px 12px; cursor: pointer; font-family: var(--font); font-size: .77rem;
      transition: all var(--dur);
    }
    .grid-close:hover { background: rgba(255,255,255,.12); color: #fff; }
    .grid-scroll {
      flex: 1; overflow-y: auto; padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px; align-content: start;
    }
    .grid-cell {
      position: relative; width: 100%; aspect-ratio: 16/9;
      border-radius: 7px; overflow: hidden; cursor: pointer;
      border: 2px solid transparent;
      transition: border-color var(--dur), transform var(--dur), box-shadow var(--dur);
    }
    .grid-cell:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.5); border-color: rgba(255,255,255,.22); }
    .grid-cell.active { border-color: var(--accent); }
    .grid-cell-inner { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .grid-idx {
      position: absolute; bottom: 5px; right: 7px;
      font-size: .58rem; color: rgba(255,255,255,.45); font-family: var(--mono);
      background: rgba(0,0,0,.5); padding: 1px 4px; border-radius: 3px;
      pointer-events: none; z-index: 5;
    }

    /* ── Presenter overlay ───────────────────────────────────────────────── */
    .presenter-overlay {
      position: fixed; inset: 0; z-index: 700;
      background: #000; display: none; flex-direction: column;
    }
    .presenter-overlay.active { display: flex; }
    .presenter-stage { flex: 1; position: relative; overflow: hidden; }
    .pres-notes {
      flex-shrink: 0; padding: 10px 20px; max-height: 90px; overflow-y: auto;
      background: rgba(0,0,0,.7); border-top: 1px solid rgba(255,255,255,.06);
      font-size: .8rem; line-height: 1.55; color: rgba(255,255,255,.6);
    }
    .pres-notes-label {
      font-size: .62rem; text-transform: uppercase; letter-spacing: .5px;
      color: rgba(255,255,255,.3); margin-bottom: 3px;
    }
    .presenter-bar {
      height: 54px; flex-shrink: 0;
      background: rgba(0,0,0,.85); border-top: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; gap: 10px; padding: 0 18px;
    }
    .pres-timer {
      font-family: var(--mono); font-size: 1rem; font-weight: 700;
      color: var(--success); min-width: 66px;
    }
    .pres-counter { font-size: .8rem; color: rgba(255,255,255,.4); }
    .pres-nav { display: flex; gap: 6px; }
    .pres-nav-btn {
      width: 34px; height: 34px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.7); border-radius: 6px;
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--dur);
    }
    .pres-nav-btn:hover:not(:disabled) { background: rgba(255,255,255,.12); }
    .pres-nav-btn:disabled { opacity: .3; cursor: default; }
    .pres-exit {
      margin-left: auto;
      background: none; border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.5); border-radius: 6px;
      padding: 5px 12px; cursor: pointer; font-family: var(--font); font-size: .78rem;
      transition: all var(--dur);
    }
    .pres-exit:hover { background: rgba(255,255,255,.08); color: #fff; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header-bar">
    <div class="header-logo">
      <h1>Presentation <span>Sage</span></h1>
      <div class="header-tagline">YAML → slides → export</div>
    </div>
    <a href="https://neorgon.com/" class="header-home" title="neorgon.com" target="_blank" rel="noopener noreferrer">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
</a>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-label">Theme:</span>
    <select class="theme-select" id="theme-select" onchange="setTheme(this.value)" title="Slide theme">
      <option value="neorgon">Neorgon</option>
      <option value="midnight">Midnight</option>
      <option value="ember">Ember</option>
      <option value="minimal">Minimal</option>
    </select>
    <div class="sep"></div>
    <span class="toolbar-label">Export:</span>
    <button class="btn btn-sm" onclick="exportYAML()" title="Download YAML source">↓ YAML</button>
    <button class="btn btn-sm" onclick="exportMarp()" title="Download Marp Markdown (run with marp --pptx or --html)">↓ Marp MD</button>
    <button class="btn btn-sm" onclick="exportHTML()" title="Download standalone HTML slideshow">↓ HTML</button>
    <button class="btn btn-sm btn-primary" onclick="exportPPTX()" title="Download PowerPoint file">↓ PPTX</button>
    <div class="sep"></div>
    <button class="btn btn-sm btn-ghost" onclick="loadSample()" title="Load example deck">⊕ Sample</button>
    <button class="btn btn-sm btn-ghost" onclick="runAudit()" title="Full-deck flow audit">🔍 Audit</button>
    <button class="btn btn-sm btn-ghost" onclick="openGrid()" title="Grid overview — all slides at a glance (G)">⊞ Overview</button>
    <button class="btn btn-sm btn-ghost" onclick="openPresenter()" title="Present fullscreen with notes + timer (F)">⛶ Present</button>
  </div>

  <!-- Workspace -->
  <div class="workspace">

    <!-- Editor pane -->
    <div class="editor-pane">
      <div class="pane-header">
        <span class="dot dot-blue"></span> YAML source
        <span id="slide-count-badge" style="margin-left:auto;font-size:.68rem;color:var(--text-dim)"></span>
      </div>
      <textarea id="yaml-input"
        spellcheck="false"
        placeholder="# Paste your YAML here, or click ⊕ Sample to load an example.
# See CLAUDE.md for the full schema and presentation tips."></textarea>
      <div class="warnings-bar empty" id="warnings">✓ No issues</div>
    </div>

    <!-- Preview pane -->
    <div class="preview-pane">
      <div class="preview-header">
        <span class="dot dot-green"></span> Preview
        <div class="slide-nav">
          <button class="nav-btn" id="prev-btn" onclick="prevSlide()" disabled>‹</button>
          <span id="slide-counter">— / —</span>
          <button class="nav-btn" id="next-btn" onclick="nextSlide()" disabled>›</button>
        </div>
      </div>
      <div class="slide-stage" id="stage">
        <div class="stage-empty">
          <div class="s-icon">📄</div>
          <p>Paste YAML to get started<br>or click ⊕ Sample above</p>
        </div>
      </div>
      <div class="filmstrip" id="filmstrip"></div>
      <div class="audit-panel" id="audit-panel">
        <div class="audit-inner" id="audit-inner"></div>
      </div>
    </div>

  </div>

  <!-- Fullscreen overlay -->
  <div class="fullscreen-stage" id="fs-stage">
    <button class="fs-exit" onclick="closeFullscreen()">✕ Esc</button>
    <div id="fs-slide-host" style="position:absolute;inset:0;"></div>
    <div class="fullscreen-controls">
      <button class="nav-btn" id="fs-prev" onclick="fsPrev()">‹</button>
      <span id="fs-counter">1 / 1</span>
      <button class="nav-btn" id="fs-next" onclick="fsNext()">›</button>
    </div>
  </div>

  <!-- Grid overview overlay -->
  <div class="grid-overlay" id="grid-overlay">
    <div class="grid-overlay-bar">
      <h2>⊞ All Slides</h2>
      <span id="grid-count"></span>
      <button class="grid-close" onclick="closeGrid()">✕ Close (Esc)</button>
    </div>
    <div class="grid-scroll" id="grid-scroll"></div>
  </div>

  <!-- Presenter overlay -->
  <div class="presenter-overlay" id="pres-overlay">
    <div class="presenter-stage" id="pres-stage"></div>
    <div class="pres-notes" id="pres-notes" style="display:none">
      <div class="pres-notes-label">Speaker note</div>
      <div id="pres-note-text"></div>
    </div>
    <div class="presenter-bar">
      <span class="pres-timer" id="pres-timer">0:00:00</span>
      <div class="pres-nav">
        <button class="pres-nav-btn" id="pres-prev" onclick="pressPrev()">‹</button>
        <button class="pres-nav-btn" id="pres-next" onclick="pressNext()">›</button>
      </div>
      <span class="pres-counter" id="pres-counter">1 / 1</span>
      <button class="pres-exit" onclick="closePresenter()">✕ Exit (Esc)</button>
    </div>
  </div>

  <!-- CDN deps -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

  <script>
  /* ═══════════════════════════════════════════════════════════════════════════
     Themes
  ═══════════════════════════════════════════════════════════════════════════ */
  const THEMES = {
    neorgon: {
      bg: '#080f20', accent: '#0063e5', text: '#f9f9f9', ts: '#cacaca',
      muted: 'rgba(255,255,255,.45)', dim: 'rgba(255,255,255,.22)',
      border: 'rgba(255,255,255,.08)', codeBg: 'rgba(0,0,0,.5)', codeText: '#a5f3fc',
      grad: 'linear-gradient(135deg,rgba(0,99,229,.07) 0%,transparent 55%)',
    },
    midnight: {
      bg: '#0d0b1e', accent: '#a78bfa', text: '#f0ecff', ts: '#d8d0f5',
      muted: 'rgba(216,208,245,.45)', dim: 'rgba(216,208,245,.22)',
      border: 'rgba(167,139,250,.12)', codeBg: 'rgba(0,0,20,.6)', codeText: '#c4b5fd',
      grad: 'linear-gradient(135deg,rgba(167,139,250,.08) 0%,transparent 55%)',
    },
    ember: {
      bg: '#130900', accent: '#f59e0b', text: '#fef3c7', ts: '#fde68a',
      muted: 'rgba(253,230,138,.45)', dim: 'rgba(253,230,138,.22)',
      border: 'rgba(245,158,11,.12)', codeBg: 'rgba(0,0,0,.55)', codeText: '#fde68a',
      grad: 'linear-gradient(135deg,rgba(245,158,11,.06) 0%,transparent 55%)',
    },
    minimal: {
      bg: '#f8fafc', accent: '#1d4ed8', text: '#0f172a', ts: '#1e293b',
      muted: 'rgba(15,23,42,.5)', dim: 'rgba(15,23,42,.3)',
      border: 'rgba(15,23,42,.1)', codeBg: 'rgba(0,0,0,.04)', codeText: '#1e40af',
      grad: 'linear-gradient(135deg,rgba(29,78,216,.04) 0%,transparent 55%)',
    },
  };

  let currentTheme = localStorage.getItem('pres-sage-theme') || 'neorgon';

  function applyTheme(el, name) {
    const t = THEMES[name] || THEMES.neorgon;
    el.style.background = t.bg;
    // pass theme values as inline CSS vars used by slide child styles
    el.style.setProperty('--sl-accent',    t.accent);
    el.style.setProperty('--sl-text',      t.text);
    el.style.setProperty('--sl-ts',        t.ts);
    el.style.setProperty('--sl-muted',     t.muted);
    el.style.setProperty('--sl-dim',       t.dim);
    el.style.setProperty('--sl-border',    t.border);
    el.style.setProperty('--sl-code-bg',   t.codeBg);
    el.style.setProperty('--sl-code-text', t.codeText);
    el.style.setProperty('--sl-grad',      t.grad);
  }

  function setTheme(name) {
    if (!THEMES[name]) return;
    currentTheme = name;
    localStorage.setItem('pres-sage-theme', name);
    if (state.slides.length) showSlide(state.current);
  }

  /* ═══════════════════════════════════════════════════════════════════════════
     State
  ═══════════════════════════════════════════════════════════════════════════ */
  let state = {
    slides:  [],
    meta:    {},
    current: 0,
    fsCurrent: 0,
    error:   null,
  };

  /* ═══════════════════════════════════════════════════════════════════════════
     YAML parser
  ═══════════════════════════════════════════════════════════════════════════ */
  function parseYAML(text) {
    try {
      const doc = jsyaml.load(text);
      if (!doc || !doc.presentation)
        return { error: 'Root key "presentation:" not found' };
      const p = doc.presentation;
      return {
        meta: {
          title:    p.title    || 'Untitled',
          subtitle: p.subtitle || '',
          author:   p.author   || '',
          date:     p.date     || '',
          logo:     p.logo     || '',
          logo_all: !!p.logo_all,
        },
        slides: p.slides || [],
      };
    } catch (e) {
      return { error: e.message };
    }
  }

  /* ═══════════════════════════════════════════════════════════════════════════
     Coaching / validation
  ═══════════════════════════════════════════════════════════════════════════ */
  function validate(slides, meta) {
    const W = [];
    const add = (level, slide, msg) => W.push({ level, slide, msg });

    let hasQA  = false;
    let hasCTA = false;

    slides.forEach((slide, i) => {
      const n    = i + 1;
      const type = slide.type || 'bullets';

      if (type === 'qa')  hasQA  = true;
      if (type === 'cta') hasCTA = true;

      if (!slide.heading && !['quote','qa','cta'].includes(type))
        add('warn', n, 'Missing heading — every slide needs a clear label');

      if (type === 'bullets') {
        const bullets = slide.bullets || [];
        if (bullets.length > 5)
          add('warn', n, `${bullets.length} bullets — aim for ≤5. Split into 2 slides?`);

        bullets.forEach((b, bi) => {
          const words = String(b).trim().split(/\s+/).filter(Boolean);
          if (words.length > 10)
            add('warn', n, `Bullet ${bi+1}: ${words.length} words — aim for ≤10`);
          if (words.length > 5 && String(b).trim().endsWith('.'))
            add('info', n, `Bullet ${bi+1}: full sentence — fragments land harder`);
        });
      }

      if (type === 'code') {
        const lines = (slide.code || '').split('\n').length;
        if (lines > 15)
          add('warn', n, `Code block: ${lines} lines — trim to ≤15 or show only the key part`);
      }

      if (type === 'split') {
        const max = Math.max(
          (slide.left?.bullets  || []).length,
          (slide.right?.bullets || []).length
        );
        if (max > 4)
          add('warn', n, `Split slide: ${max} items per column — max 4 recommended`);
      }
    });

    // Deck-level checks
    if (slides.length > 0 && slides[0].type !== 'title')
      add('info', 1, 'First slide isn\'t a title — consider adding one for context');

    if (slides.length > 5 && !hasQA)
      add('info', null, 'No Q&A or pause slide — add one every 4–5 slides');

    if (slides.length > 3 && !hasCTA)
      add('info', null, 'No CTA slide — what\'s the one thing your audience should do?');

    const last = slides[slides.length - 1];
    if (last && last.type !== 'cta' && last.type !== 'qa' && slides.length > 2)
      add('info', slides.length, 'Last slide isn\'t a CTA or Q&A — does it end with a clear action?');

    return W;
  }

  /* ═══════════════════════════════════════════════════════════════════════════
     Slide renderer → HTMLElement
  ═══════════════════════════════════════════════════════════════════════════ */
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderSlide(slide, index, total) {
    const el  = document.createElement('div');
    const num = document.createElement('div');
    num.className = 'slide-num';
    num.textContent = `${index + 1} / ${total}`;

    const type = slide.type || 'bullets';
    el.className = `slide slide-type-${type}`;
    applyTheme(el, currentTheme);

    switch (type) {
      case 'title': {
        const logoHtml = state.meta.logo
          ? `<img class="title-logo" src="${esc(state.meta.logo)}" alt="logo">`
          : '';
        el.innerHTML = `
          ${logoHtml}
          <div class="s-heading">${esc(slide.heading || state.meta.title)}</div>
          <div class="accent-bar"></div>
          <div class="s-subtitle">${esc(slide.subtitle || state.meta.subtitle)}</div>
          <div class="s-meta">
            <span>${esc(state.meta.author)}</span>
            <span>${esc(slide.date || state.meta.date)}</span>
          </div>`;
        break;
      }
      case 'bullets': {
        const li = (slide.bullets || [])
          .map(b => `<li>${esc(b)}</li>`).join('');
        el.innerHTML = `
          <div class="s-heading">${esc(slide.heading)}</div>
          <ul class="s-bullets">${li}</ul>`;
        break;
      }
      case 'split': {
        const mkCol = (col) => {
          if (!col) return '';
          const li = (col.bullets || []).map(b => `<li>${esc(b)}</li>`).join('');
          return `<div>
            <div class="split-col-head">${esc(col.heading || '')}</div>
            <ul class="s-bullets">${li}</ul>
          </div>`;
        };
        el.innerHTML = `
          <div class="s-heading">${esc(slide.heading || '')}</div>
          <div class="split-cols">
            ${mkCol(slide.left)}
            ${mkCol(slide.right)}
          </div>`;
        break;
      }
      case 'code': {
        el.innerHTML = `
          <div class="s-heading">${esc(slide.heading || 'Code')}</div>
          <div class="code-block">
            <div class="code-lang">${esc(slide.language || 'code')}</div>
            <pre>${esc(slide.code || '')}</pre>
          </div>`;
        break;
      }
      case 'quote': {
        el.innerHTML = `
          <div class="quote-mark">"</div>
          <div class="quote-text">${esc(slide.text || '')}</div>
          ${slide.source ? `<div class="quote-source">— ${esc(slide.source)}</div>` : ''}`;
        break;
      }
      case 'divider': {
        el.innerHTML = `
          <div class="s-heading">${esc(slide.heading || '')}</div>
          <div class="accent-bar" style="margin:14px 0"></div>
          ${slide.subtitle ? `<div class="s-subtitle">${esc(slide.subtitle)}</div>` : ''}`;
        break;
      }
      case 'qa': {
        el.innerHTML = `
          <div class="qa-icon">💬</div>
          <div class="s-heading">${esc(slide.heading || 'Questions?')}</div>
          ${slide.subtext ? `<div class="s-subtext">${esc(slide.subtext)}</div>` : ''}`;
        break;
      }
      case 'cta': {
        el.innerHTML = `
          <div class="s-heading">${esc(slide.heading || 'Next Steps')}</div>
          ${slide.action ? `<div class="cta-pill">→ ${esc(slide.action)}</div>` : ''}
          ${slide.subtext ? `<div class="s-subtext">${esc(slide.subtext)}</div>` : ''}`;
        break;
      }
      default:
        el.className = 'slide slide-state';
        el.innerHTML = `<p>Unknown slide type: <strong>${esc(type)}</strong></p>`;
    }

    el.appendChild(num);

    // Watermark logo on every non-title slide
    if (state.meta.logo && state.meta.logo_all && type !== 'title') {
      const wm = document.createElement('img');
      wm.className = 'slide-logo-watermark';
      wm.src = state.meta.logo;
      wm.alt = '';
      el.appendChild(wm);
    }

    return el;
  }

  /* ═══════════════════════════════════════════════════════════════════════════
     UI update loop
  ═══════════════════════════════════════════════════════════════════════════ */
  function update() {
    const text = document.getElementById('yaml-input').value.trim();
    localStorage.setItem('presentation-sage', document.getElementById('yaml-input').value);

    if (!text) {
      state.slides = []; state.meta = {}; state.error = null;
      showEmpty(); updateWarnings([]); updateCounter(); return;
    }

    const result = parseYAML(text);
    if (result.error) {
      state.error = result.error;
      showError(result.error);
      updateWarnings([{ level: 'error', slide: null, msg: result.error }]);
      return;
    }

    state.error  = null;
    state.slides = result.slides;
    state.meta   = result.meta;
    if (state.current >= state.slides.length)
      state.current = Math.max(0, state.slides.length - 1);

    showSlide(state.current);
    updateCounter();
    updateWarnings(validate(state.slides, state.meta));
    renderFilmstrip();

    const badge = document.getElementById('slide-count-badge');
    badge.textContent = state.slides.length
      ? `${state.slides.length} slide${state.slides.length !== 1 ? 's' : ''}`
      : '';
  }

  /* Scale a 960×540 slide element to fill its container */
  function scaleSlide(slideEl, container) {
    const cw = container.clientWidth;
    const ch = container.clientHeight;
    if (!cw || !ch) return;
    const scale = Math.min(cw / 960, ch / 540) * 0.96;
    slideEl.style.transform = `scale(${scale})`;
    slideEl.style.left = `${(cw - 960 * scale) / 2}px`;
    slideEl.style.top  = `${(ch - 540 * scale) / 2}px`;
  }

  const stageObserver = new ResizeObserver(() => {
    const stage = document.getElementById('stage');
    const slide = stage.querySelector('.slide:not(.slide-state)');
    if (slide) scaleSlide(slide, stage);
  });
  stageObserver.observe(document.getElementById('stage'));

  const fsObserver = new ResizeObserver(() => {
    const stage = document.getElementById('fs-slide-host');
    const slide = stage.querySelector('.slide');
    if (slide) scaleSlide(slide, document.getElementById('fs-stage'));
  });
  fsObserver.observe(document.getElementById('fs-stage'));

  function showEmpty() {
    document.getElementById('stage').innerHTML = `
      <div class="stage-empty">
        <div class="s-icon">📄</div>
        <p>Paste YAML to get started<br>or click ⊕ Sample above</p>
      </div>`;
    document.getElementById('slide-count-badge').textContent = '';
  }

  function showError(msg) {
    document.getElementById('stage').innerHTML = `
      <div class="stage-empty">
        <div class="s-icon">⚠</div>
        <p style="color:var(--danger);font-family:var(--mono);font-size:.75rem;max-width:80%">${esc(msg)}</p>
      </div>`;
  }

  function showSlide(index) {
    const stage = document.getElementById('stage');
    stage.innerHTML = '';
    if (!state.slides.length) { showEmpty(); return; }
    const el = renderSlide(state.slides[index], index, state.slides.length);
    stage.appendChild(el);
    scaleSlide(el, stage);
  }

  function updateCounter() {
    const n = state.slides.length;
    document.getElementById('slide-counter').textContent =
      n ? `${state.current + 1} / ${n}` : '— / —';
    document.getElementById('prev-btn').disabled = state.current === 0 || !n;
    document.getElementById('next-btn').disabled = state.current >= n - 1 || !n;
  }

  function updateWarnings(ws) {
    const el = document.getElementById('warnings');
    if (!ws.length) {
      el.className = 'warnings-bar empty';
      el.innerHTML = '✓ No issues';
      return;
    }
    el.className = 'warnings-bar';
    el.innerHTML = ws.map(w => `
      <div class="warning-item lvl-${w.level}">
        <span class="warning-badge">${w.slide ? `slide ${w.slide}` : 'deck'}</span>
        <span>${esc(w.msg)}</span>
      </div>`).join('');
  }

  /* ═══════════════════════════════════════════════════════════════════════════
     Navigation
  ═══════════════════════════════════════════════════════════════════════════ */
  function prevSlide() {
    if (state.current > 0) {
      state.current--;
      showSlide(state.current);
      updateCounter();
      syncFilmstrip();
    }
  }
  function nextSlide() {
    if (state.current < state.slides.length - 1) {
      state.current++;
      showSlide(state.current);
      updateCounter();
      syncFilmstrip();
    }
  }

  document.addEventListener('keydown', (e) => {
    const inEditor = document.activeElement === document.getElementById('yaml-input');
    if (inEditor) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevSlide();
  });

  /* ═══════════════════════════════════════════════════════════════════════════
     Fullscreen
  ═══════════════════════════════════════════════════════════════════════════ */
  function openFullscreen() {
    if (!state.slides.length) return;
    state.fsCurrent = state.current;
    fsRender();
    document.getElementById('fs-stage').classList.add('active');
  }
  function closeFullscreen() {
    document.getElementById('fs-stage').classList.remove('active');
  }
  function fsPrev() {
    if (state.fsCurrent > 0) { state.fsCurrent--; fsRender(); }
  }
  function fsNext() {
    if (state.fsCurrent < state.slides.length - 1) { state.fsCurrent++; fsRender(); }
  }
  function fsRender() {
    const host = document.getElementById('fs-slide-host');
    host.innerHTML = '';
    const el = renderSlide(state.slides[state.fsCurrent], state.fsCurrent, state.slides.length);
    host.appendChild(el);
    scaleSlide(el, document.getElementById('fs-stage'));
    document.getElementById('fs-counter').textContent =
      `${state.fsCurrent + 1} / ${state.slides.length}`;
    document.getElementById('fs-prev').disabled = state.fsCurrent === 0;
    document.getElementById('fs-next').disabled = state.fsCurrent >= state.slides.length - 1;
  }

  document.addEventListener('keydown', (e) => {
    const fs = document.getElementById('fs-stage');
    if (!fs.classList.contains('active')) return;
    if (e.key === 'Escape') closeFullscreen();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') fsNext();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   fsPrev();
  });

  /* ═══════════════════════════════════════════════════════════════════════════
     Filmstrip
  ═══════════════════════════════════════════════════════════════════════════ */
  function renderFilmstrip() {
    const strip = document.getElementById('filmstrip');
    strip.innerHTML = '';
    const t = THEMES[currentTheme] || THEMES.neorgon;
    state.slides.forEach((slide, i) => {
      const type  = slide.type || 'bullets';
      const label = slide.heading || slide.text || slide.action || '';
      const thumb = document.createElement('div');
      thumb.className = 'film-thumb' + (i === state.current ? ' active' : '');
      thumb.style.background = t.bg;
      if (i === state.current) thumb.style.borderColor = t.accent;
      thumb.innerHTML = `
        <div class="film-type">${type}</div>
        <div class="film-num">${i + 1}</div>
        <div class="film-text">${esc(label.substring(0, 28))}</div>`;
      thumb.onclick = () => { state.current = i; showSlide(i); updateCounter(); syncFilmstrip(); };
      strip.appendChild(thumb);
    });
  }

  function syncFilmstrip() {
    const thumbs = document.querySelectorAll('.film-thumb');
    const t = THEMES[currentTheme] || THEMES.neorgon;
    thumbs.forEach((el, i) => {
      const isActive = i === state.current;
      el.classList.toggle('active', isActive);
      el.style.borderColor = isActive ? t.accent : '';
    });
    const active = document.querySelector('.film-thumb.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  /* ═══════════════════════════════════════════════════════════════════════════
     Audit panel (inline, below preview)
  ═══════════════════════════════════════════════════════════════════════════ */
  let auditOpen = false;

  function runAudit() {
    if (!state.slides.length) return;
    auditOpen = !auditOpen;
    document.getElementById('audit-panel').classList.toggle('open', auditOpen);
    document.querySelector('[onclick="runAudit()"]').textContent =
      auditOpen ? '🔍 Hide' : '🔍 Audit';
    if (!auditOpen) return;

    const ws = validate(state.slides, state.meta);
    const issueHtml = ws.length
      ? ws.map(w => `<div class="audit-item lvl-${w.level}">
          <span class="audit-badge">${w.slide ? 'slide ' + w.slide : 'deck'}</span>
          <span>${esc(w.msg)}</span></div>`).join('')
      : `<div class="audit-ok">✓ All density checks passed</div>`;

    const flowQs = [
      'Does slide 1 state the problem — not just the topic?',
      'Is the order: problem → solution → proof → ask?',
      'Is there exactly ONE idea per slide?',
      'If you printed only the headings, do they tell a coherent story?',
      'Can you remove any slide without losing the argument?',
      'Does the last slide tell the audience what to do next?',
    ];

    document.getElementById('audit-inner').innerHTML = `
      <div class="audit-title">"${esc(state.meta.title)}" · ${state.slides.length} slides · ${ws.length} issue(s)</div>
      <div class="audit-section">
        <div class="audit-section-head">Density checks</div>${issueHtml}
      </div>
      <div class="audit-section">
        <div class="audit-section-head">Flow questions</div>
        ${flowQs.map(q => `<div class="audit-question">${esc(q)}</div>`).join('')}
      </div>`;
  }

  /* ═══════════════════════════════════════════════════════════════════════════
     Grid overview
  ═══════════════════════════════════════════════════════════════════════════ */
  function openGrid() {
    if (!state.slides.length) return;
    const grid = document.getElementById('grid-scroll');
    grid.innerHTML = '';
    document.getElementById('grid-count').textContent =
      `${state.slides.length} slide${state.slides.length !== 1 ? 's' : ''}`;

    state.slides.forEach((slide, i) => {
      const cell  = document.createElement('div');
      cell.className = 'grid-cell' + (i === state.current ? ' active' : '');
      const inner = document.createElement('div');
      inner.className = 'grid-cell-inner';
      inner.appendChild(renderSlide(slide, i, state.slides.length));
      const idx = document.createElement('div');
      idx.className = 'grid-idx';
      idx.textContent = i + 1;
      cell.appendChild(inner);
      cell.appendChild(idx);
      cell.onclick = () => { state.current = i; showSlide(i); updateCounter(); syncFilmstrip(); closeGrid(); };
      grid.appendChild(cell);
    });

    document.getElementById('grid-overlay').classList.add('active');

    // Scale each slide to fit its cell after paint
    requestAnimationFrame(() => {
      document.querySelectorAll('.grid-cell-inner').forEach(inner => {
        const cell    = inner.closest('.grid-cell');
        const slideEl = inner.querySelector('.slide');
        if (!cell || !slideEl) return;
        const scale = cell.clientWidth / 960;
        slideEl.style.transform       = `scale(${scale})`;
        slideEl.style.transformOrigin = 'top left';
        slideEl.style.position        = 'absolute';
        slideEl.style.left = '0'; slideEl.style.top = '0';
      });
    });
  }

  function closeGrid() {
    document.getElementById('grid-overlay').classList.remove('active');
  }

  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('grid-overlay').classList.contains('active')) return;
    if (e.key === 'Escape') closeGrid();
  });

  // Keyboard shortcuts: G = grid, F = fullscreen present
  document.addEventListener('keydown', (e) => {
    const inEditor = document.activeElement === document.getElementById('yaml-input');
    const inPres   = document.getElementById('pres-overlay').classList.contains('active');
    const inGrid   = document.getElementById('grid-overlay').classList.contains('active');
    if (inEditor || inPres || inGrid) return;
    if (e.key === 'g' || e.key === 'G') openGrid();
    if (e.key === 'f' || e.key === 'F') openPresenter();
  });

  /* ═══════════════════════════════════════════════════════════════════════════
     Presenter mode
  ═══════════════════════════════════════════════════════════════════════════ */
  let _presTimer = null;
  let _presSecs  = 0;
  let _presCur   = 0;

  function openPresenter() {
    if (!state.slides.length) return;
    _presCur  = state.current;
    _presSecs = 0;
    presRender();
    document.getElementById('pres-overlay').classList.add('active');
    _presTimer = setInterval(() => {
      _presSecs++;
      const h = Math.floor(_presSecs / 3600);
      const m = Math.floor((_presSecs % 3600) / 60);
      const s = _presSecs % 60;
      document.getElementById('pres-timer').textContent =
        `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);
  }

  function closePresenter() {
    document.getElementById('pres-overlay').classList.remove('active');
    clearInterval(_presTimer);
    _presTimer = null;
  }

  function presRender() {
    const stage = document.getElementById('pres-stage');
    stage.innerHTML = '';
    const slide = state.slides[_presCur];
    const el = renderSlide(slide, _presCur, state.slides.length);
    stage.appendChild(el);
    requestAnimationFrame(() => scaleSlide(el, stage));
    document.getElementById('pres-counter').textContent = `${_presCur + 1} / ${state.slides.length}`;
    document.getElementById('pres-prev').disabled = _presCur === 0;
    document.getElementById('pres-next').disabled = _presCur >= state.slides.length - 1;
    const notesEl   = document.getElementById('pres-notes');
    const notesText = document.getElementById('pres-note-text');
    if (slide.note) { notesText.textContent = slide.note; notesEl.style.display = ''; }
    else { notesEl.style.display = 'none'; }
  }

  function pressPrev() { if (_presCur > 0) { _presCur--; presRender(); } }
  function pressNext() { if (_presCur < state.slides.length - 1) { _presCur++; presRender(); } }

  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('pres-overlay').classList.contains('active')) return;
    if (e.key === 'Escape') closePresenter();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') pressNext();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   pressPrev();
  });

  /* ═══════════════════════════════════════════════════════════════════════════
     Exports
  ═══════════════════════════════════════════════════════════════════════════ */
  function slug() {
    return (state.meta.title || 'presentation')
      .toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  }

  function download(content, filename, mime) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: mime }));
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }

  function exportYAML() {
    const text = document.getElementById('yaml-input').value;
    if (!text.trim()) { alert('Nothing to export.'); return; }
    download(text, `${slug()}.yaml`, 'text/yaml');
  }

  function exportMarp() {
    if (!state.slides.length) { alert('Load a presentation first.'); return; }
    const { meta, slides } = state;
    const lines = [
      '---', 'marp: true', 'theme: default', 'paginate: true',
      `title: "${meta.title}"`, `author: "${meta.author}"`, '---', '',
    ];

    slides.forEach((slide, i) => {
      if (i > 0) lines.push('---', '');
      const type = slide.type || 'bullets';
      switch (type) {
        case 'title':
          lines.push(`# ${slide.heading || meta.title}`);
          if (slide.subtitle || meta.subtitle) lines.push(``, `**${slide.subtitle || meta.subtitle}**`);
          if (meta.author) lines.push('', meta.author);
          if (meta.date)   lines.push(meta.date);
          break;
        case 'bullets':
          lines.push(`## ${slide.heading || ''}`);
          (slide.bullets || []).forEach(b => lines.push(`- ${b}`));
          break;
        case 'split':
          lines.push(`## ${slide.heading || ''}`);
          lines.push('', `**${slide.left?.heading || 'Left'}**`);
          (slide.left?.bullets  || []).forEach(b => lines.push(`- ${b}`));
          lines.push('', `**${slide.right?.heading || 'Right'}**`);
          (slide.right?.bullets || []).forEach(b => lines.push(`- ${b}`));
          break;
        case 'code':
          lines.push(`## ${slide.heading || 'Code'}`, '',
            `\`\`\`${slide.language || ''}`, slide.code || '', '```');
          break;
        case 'quote':
          lines.push(`> ${slide.text || ''}`);
          if (slide.source) lines.push('', `— ${slide.source}`);
          break;
        case 'divider':
          lines.push(`# ${slide.heading || ''}`);
          if (slide.subtitle) lines.push('', slide.subtitle);
          break;
        case 'qa':
          lines.push(`# ${slide.heading || 'Questions?'}`);
          if (slide.subtext) lines.push('', slide.subtext);
          break;
        case 'cta':
          lines.push(`# ${slide.heading || 'Next Steps'}`);
          if (slide.action) lines.push('', `**→ ${slide.action}**`);
          if (slide.subtext) lines.push('', slide.subtext);
          break;
      }
      lines.push('');
    });

    download(lines.join('\n'), `${slug()}.md`, 'text/markdown');
  }

  function exportHTML() {
    if (!state.slides.length) { alert('Load a presentation first.'); return; }
    const { meta, slides } = state;

    const slideMarkup = slides.map((slide, i) => {
      const el = renderSlide(slide, i, slides.length);
      el.style.cssText = 'max-width:min(92vw,calc(92vh*16/9));border-radius:4px;';
      return `<div class="fs-slide${i === 0 ? ' active' : ''}">${el.outerHTML}</div>`;
    }).join('\n');

    const inlineStyle = Array.from(document.styleSheets[0].cssRules)
      .map(r => r.cssText).join('\n');

    const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${esc(meta.title)}</title>
<style>
${inlineStyle}
body{overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;background:#000;}
.fs-slide{display:none;position:absolute;}
.fs-slide.active{display:flex;}
.controls{position:fixed;bottom:18px;display:flex;align-items:center;gap:12px;z-index:10;}
.controls .nav-btn{width:36px;height:36px;font-size:1rem;}
#ctr{font-size:.82rem;color:rgba(255,255,255,.4);min-width:60px;text-align:center;}
</style>
</head>
<body>
${slideMarkup}
<div class="controls">
  <button class="nav-btn" onclick="prev()">‹</button>
  <span id="ctr">1 / ${slides.length}</span>
  <button class="nav-btn" onclick="next()">›</button>
</div>
<script>
let cur=0,total=${slides.length};
function show(n){document.querySelectorAll('.fs-slide').forEach((s,i)=>s.classList.toggle('active',i===n));document.getElementById('ctr').textContent=(n+1)+' / '+total;}
function prev(){if(cur>0){cur--;show(cur);}}
function next(){if(cur<total-1){cur++;show(cur);}}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();
});
<\/script>
</body></html>`;

    download(html, `${slug()}.html`, 'text/html');
  }

  function exportPPTX() {
    if (!state.slides.length) { alert('Load a presentation first.'); return; }
    if (typeof PptxGenJS === 'undefined') {
      alert('PptxGenJS not loaded — check your internet connection.'); return;
    }

    const { meta, slides } = state;
    const pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_WIDE';

    const C = {
      bg:      '040714',
      bg2:     '080f20',
      accent:  '0063e5',
      white:   'FFFFFF',
      muted:   '8899bb',
      dim:     '445566',
      bullet:  'a5f3fc',
      code_bg: '000000',
    };

    slides.forEach((slide) => {
      const s    = pptx.addSlide();
      const type = slide.type || 'bullets';
      s.background = { color: C.bg2 };

      // Top accent stripe
      s.addShape(pptx.ShapeType.rect, {
        x: 0, y: 0, w: '100%', h: 0.04,
        fill: { color: C.accent }, line: { type: 'none' },
      });

      switch (type) {
        case 'title':
          s.addText(slide.heading || meta.title || '', {
            x: 0.8, y: 1.3, w: 8.4, h: 1.4,
            fontSize: 34, bold: true, color: C.white,
            align: 'center', valign: 'middle',
          });
          s.addShape(pptx.ShapeType.rect, {
            x: 4.25, y: 2.9, w: 1.5, h: 0.055,
            fill: { color: C.accent }, line: { type: 'none' },
          });
          if (slide.subtitle || meta.subtitle) {
            s.addText(slide.subtitle || meta.subtitle, {
              x: 0.8, y: 3.1, w: 8.4, h: 0.7,
              fontSize: 15, color: C.muted, align: 'center',
            });
          }
          if (meta.author)
            s.addText(meta.author, { x: 0.5, y: 4.8, w: 4, h: 0.38, fontSize: 10, color: C.dim });
          if (meta.date || slide.date)
            s.addText(slide.date || meta.date, {
              x: 5.5, y: 4.8, w: 4, h: 0.38, fontSize: 10, color: C.dim, align: 'right',
            });
          break;

        case 'bullets':
          s.addText(slide.heading || '', {
            x: 0.4, y: 0.25, w: 9.2, h: 0.72,
            fontSize: 19, bold: true, color: C.white, valign: 'middle',
          });
          s.addShape(pptx.ShapeType.line, {
            x: 0.4, y: 1.05, w: 9.2, h: 0, line: { color: '1a2a3a', width: 1 },
          });
          (slide.bullets || []).forEach((b, i) => {
            s.addShape(pptx.ShapeType.ellipse, {
              x: 0.45, y: 1.35 + i * 0.62 + 0.15, w: 0.1, h: 0.1,
              fill: { color: C.accent }, line: { type: 'none' },
            });
            s.addText(String(b), {
              x: 0.68, y: 1.3 + i * 0.62, w: 8.9, h: 0.56,
              fontSize: 13, color: 'e2e8f0', valign: 'middle',
            });
          });
          break;

        case 'split': {
          s.addText(slide.heading || '', {
            x: 0.4, y: 0.25, w: 9.2, h: 0.72,
            fontSize: 19, bold: true, color: C.white,
          });
          s.addShape(pptx.ShapeType.line, {
            x: 0.4, y: 1.05, w: 9.2, h: 0, line: { color: '1a2a3a', width: 1 },
          });
          s.addShape(pptx.ShapeType.line, {
            x: 5, y: 1.15, w: 0, h: 3.5, line: { color: '1a2a3a', width: 1 },
          });
          if (slide.left?.heading)
            s.addText(slide.left.heading, {
              x: 0.4, y: 1.15, w: 4.3, h: 0.42, fontSize: 11, bold: true, color: C.accent,
            });
          (slide.left?.bullets || []).forEach((b, i) =>
            s.addText(`• ${b}`, { x: 0.4, y: 1.65 + i * 0.56, w: 4.3, h: 0.5, fontSize: 12, color: 'e2e8f0' }));
          if (slide.right?.heading)
            s.addText(slide.right.heading, {
              x: 5.3, y: 1.15, w: 4.3, h: 0.42, fontSize: 11, bold: true, color: C.accent,
            });
          (slide.right?.bullets || []).forEach((b, i) =>
            s.addText(`• ${b}`, { x: 5.3, y: 1.65 + i * 0.56, w: 4.3, h: 0.5, fontSize: 12, color: 'e2e8f0' }));
          break;
        }

        case 'code':
          s.addText(slide.heading || 'Code', {
            x: 0.4, y: 0.25, w: 9.2, h: 0.72, fontSize: 19, bold: true, color: C.white,
          });
          s.addShape(pptx.ShapeType.rect, {
            x: 0.4, y: 1.05, w: 9.2, h: 3.6,
            fill: { color: C.code_bg, transparency: 30 }, line: { color: '1a2a3a', width: 1 },
          });
          s.addText(slide.code || '', {
            x: 0.6, y: 1.15, w: 8.8, h: 3.4,
            fontSize: 10, fontFace: 'Courier New', color: C.bullet,
            valign: 'top', wrap: true,
          });
          break;

        case 'quote':
          s.addText('"', { x: 0.4, y: 0.2, w: 1.2, h: 1.4, fontSize: 72, color: C.accent, bold: true });
          s.addText(slide.text || '', {
            x: 0.8, y: 1.0, w: 8.4, h: 2.6,
            fontSize: 17, color: C.white, italic: true,
            align: 'center', valign: 'middle',
          });
          if (slide.source)
            s.addText(`— ${slide.source}`, {
              x: 0.8, y: 3.8, w: 8.4, h: 0.5,
              fontSize: 13, color: C.accent, bold: true, align: 'center',
            });
          break;

        case 'divider':
          s.background = { color: '08102a' };
          s.addText(slide.heading || '', {
            x: 0.8, y: 1.4, w: 8.4, h: 1.4,
            fontSize: 34, bold: true, color: C.white, align: 'center',
          });
          s.addShape(pptx.ShapeType.rect, {
            x: 4.25, y: 3.0, w: 1.5, h: 0.055,
            fill: { color: C.accent }, line: { type: 'none' },
          });
          if (slide.subtitle)
            s.addText(slide.subtitle, {
              x: 0.8, y: 3.2, w: 8.4, h: 0.6, fontSize: 14, color: C.muted, align: 'center',
            });
          break;

        case 'qa':
          s.addText('💬', { x: 4, y: 0.7, w: 2, h: 1.2, fontSize: 40, align: 'center' });
          s.addText(slide.heading || 'Questions?', {
            x: 0.8, y: 2.0, w: 8.4, h: 1.4,
            fontSize: 34, bold: true, color: C.white, align: 'center',
          });
          if (slide.subtext)
            s.addText(slide.subtext, {
              x: 0.8, y: 3.6, w: 8.4, h: 0.5, fontSize: 13, color: C.muted, align: 'center',
            });
          break;

        case 'cta':
          s.addText(slide.heading || 'Next Steps', {
            x: 0.8, y: 0.8, w: 8.4, h: 1.4,
            fontSize: 28, bold: true, color: C.white, align: 'center',
          });
          if (slide.action) {
            s.addShape(pptx.ShapeType.roundRect, {
              x: 2.5, y: 2.5, w: 5, h: 0.95,
              fill: { color: C.accent }, line: { type: 'none' }, rectRadius: 0.1,
            });
            s.addText(`→ ${slide.action}`, {
              x: 2.5, y: 2.5, w: 5, h: 0.95,
              fontSize: 15, bold: true, color: C.white, align: 'center', valign: 'middle',
            });
          }
          if (slide.subtext)
            s.addText(slide.subtext, {
              x: 0.8, y: 3.65, w: 8.4, h: 0.5, fontSize: 12, color: C.muted, align: 'center',
            });
          break;
      }

      // Slide number
      s.addText(`${slides.indexOf(slide) + 1}`, {
        x: 9.1, y: 5.05, w: 0.6, h: 0.3,
        fontSize: 8, color: C.dim, align: 'right',
      });
    });

    pptx.writeFile({ fileName: `${slug()}.pptx` });
  }
